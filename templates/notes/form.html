{% extends 'base.html' %}
{% block content %}

<div class="page-header">
  <h1>{% if action == 'Edit' %}✏️ Edit Note{% else %}📝 New Note{% endif %}</h1>
</div>

<div class="form-card">
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label>Title</label>
      {{ form.title }}
    </div>
    <div class="mb-3">
      <label>Content</label>
      {{ form.content }}
    </div>
    <div class="mb-3">
      <label>Tags (comma separated)</label>
      {{ form.tags_input }}
    </div>
    <div class="mb-3" style="display:flex; align-items:center; gap:10px;">
      {{ form.is_pinned }}
      <label style="margin:0; color:#aaa;">Pin this note</label>
    </div>
    <div style="display:flex; gap:12px; margin-top:24px;">
      <button type="submit" class="btn-primary" style="width:auto; padding:10px 28px;">
        {{ action }} Note
      </button>
      <a href="{% url 'notes:list' %}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
