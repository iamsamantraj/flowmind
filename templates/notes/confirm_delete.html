{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <h1>🗑 Delete Note</h1>
</div>
<div class="form-card">
  <p style="margin-bottom:20px;">Are you sure you want to delete <strong>{{ note.title }}</strong>? This cannot be undone.</p>
  <form method="POST" style="display:flex; gap:12px;">
    {% csrf_token %}
    <button type="submit" class="btn-danger">Yes, Delete</button>
    <a href="{% url 'notes:detail' note.pk %}" class="btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
