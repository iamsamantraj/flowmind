{% extends 'base.html' %}
{% block content %}

<div class="page-header">
  <h1>{% if action == 'Edit' %}✏️ Edit Task{% else %}✅ New Task{% endif %}</h1>
</div>

<div class="form-card">
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label>Task Title</label>
      {{ form.title }}
    </div>
    <div class="mb-3">
      <label>Description</label>
      {{ form.description }}
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px;">
      <div class="mb-3">
        <label>Status</label>
        {{ form.status }}
      </div>
      <div class="mb-3">
        <label>Priority</label>
        {{ form.priority }}
      </div>
      <div class="mb-3">
        <label>Due Date</label>
        {{ form.due_date }}
      </div>
    </div>
    <div style="display:flex; gap:12px; margin-top:24px;">
      <button type="submit" class="btn-primary" style="width:auto; padding:10px 28px;">{{ action }} Task</button>
      <a href="{% url 'tasks:list' %}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
