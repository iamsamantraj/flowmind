{% extends 'base.html' %}
{% block content %}

<div class="page-header">
  <h1>{% if action == 'Edit' %}✏️ Edit Goal{% else %}🎯 New Goal{% endif %}</h1>
</div>

<div class="form-card">
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label>Goal Title</label>
      {{ form.title }}
    </div>
    <div class="mb-3">
      <label>Description</label>
      {{ form.description }}
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px;">
      <div class="mb-3">
        <label>Category</label>
        {{ form.category }}
      </div>
      <div class="mb-3">
        <label>Status</label>
        {{ form.status }}
      </div>
      <div class="mb-3">
        <label>Target Date</label>
        {{ form.target_date }}
      </div>
    </div>
    <div class="mb-3">
      <label>Current Progress: <span id="progress-val">{{ form.progress.value|default:0 }}%</span></label>
      <input type="range" name="progress" min="0" max="100"
             value="{{ form.progress.value|default:0 }}"
             class="progress-slider"
             oninput="document.getElementById('progress-val').innerText = this.value + '%'">
    </div>
    <div style="display:flex; gap:12px; margin-top:24px;">
      <button type="submit" class="btn-primary" style="width:auto; padding:10px 28px;">{{ action }} Goal</button>
      <a href="{% url 'goals:list' %}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
