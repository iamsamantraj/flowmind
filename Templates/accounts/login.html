{% extends 'base.html' %}
{% block sidebar %}{% endblock %}
{% block close_layout %}{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>Welcome Back 👋</h2>
    <p class="subtitle">Login to your FlowMind workspace</p>
    <form method="POST">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label>{{ field.label }}</label>
          {{ field }}
        </div>
      {% endfor %}
      <button type="submit" class="btn-primary w-100">Login</button>
    </form>
    <p class="mt-3 text-center">No account? <a href="{% url 'accounts:register' %}">Register</a></p>
  </div>
</div>
{% endblock %}
